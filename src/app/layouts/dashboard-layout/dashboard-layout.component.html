<div class="dashboard-layout">
  <header class="dashboard-topbar">
    <button
      class="dashboard-menu-button"
      type="button"
      aria-label="Abrir menu lateral"
      [attr.aria-expanded]="isSidebarOpen()"
      aria-controls="dashboard-sidebar"
      (click)="toggleSidebar()"
    >
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
    <span class="dashboard-topbar__title">RISE</span>

    <div class="dashboard-topbar__actions">
      <button class="dashboard-icon-button" type="button" aria-label="Notificaciones">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="dashboard-icon"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
          />
        </svg>
      </button>
      <button class="dashboard-icon-button" type="button" aria-label="Ayuda">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="dashboard-icon"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"
          />
        </svg>
      </button>
    </div>
  </header>

  @if (isSidebarOpen()) {
    <button
      class="dashboard-backdrop"
      type="button"
      aria-label="Cerrar menu lateral"
      (click)="closeSidebar()"
    ></button>
  }

  <app-sidebar
    id="dashboard-sidebar"
    class="dashboard-sidebar"
    [isOpen]="isSidebarOpen()"
    [class.dashboard-sidebar--open]="isSidebarOpen()"
    aria-label="Barra lateral"
    (navigate)="closeSidebar()"
  />

  <main class="dashboard-content">
    <router-outlet />
  </main>
</div>
