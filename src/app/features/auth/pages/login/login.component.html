<section class="auth-page" aria-labelledby="login-title">
  <div class="auth-panel">
    <header class="auth-brand">
      <p class="auth-brand__name">EduGuard</p>
      <p class="auth-brand__description">Sistema de Gestión de Incidencias Escolares</p>
    </header>

    <div class="auth-card app-card">
      <div class="auth-card__content">
        <div class="auth-card__header">
          <h1 id="login-title">Bienvenido de nuevo</h1>
          <p>Ingresa tus credenciales para acceder a tu panel.</p>
        </div>

        <form class="auth-form">
          <div class="auth-field">
            <label class="auth-label" for="username">Código de usuario</label>
            <input class="app-input auth-input" id="username" name="username" type="text" placeholder="CXXXXXXXX"
              autocomplete="username" />
          </div>

          <div class="auth-field">
            <div class="auth-field__row">
              <label class="auth-label" for="password">Contraseña</label>
              <a class="auth-link" href="/login">¿Olvidaste tu contraseña?</a>
            </div>
            <input class="app-input auth-input" id="password" name="password" type="password" placeholder="••••••••"
              autocomplete="current-password" />
          </div>

          <app-auth-submit-button label="Iniciar sesión" />
        </form>

        <p class="auth-switch">
          ¿No tienes cuenta?
          <a routerLink="/register">Crear cuenta</a>
        </p>
      </div>
    </div>

    <footer class="auth-footer">Acceso Institucional Seguro y Cifrado</footer>
  </div>
</section>
