<section class="auth-page" aria-labelledby="register-title">
  <div class="auth-panel">
    <header class="auth-brand">
      <p class="auth-brand__name">EduGuard</p>
      <p class="auth-brand__description">Sistema de Gestión de Incidencias Escolares</p>
    </header>

    <div class="auth-card app-card">
      <div class="auth-card__content">
        <div class="auth-card__header">
          <h1 id="register-title">Crear cuenta</h1>
          <p>Registra tus datos para solicitar acceso institucional.</p>
        </div>

        <form class="auth-form">
          <div class="auth-field">
            <label class="auth-label" for="name">Nombre completo</label>
            <input
              class="app-input auth-input"
              id="name"
              name="name"
              type="text"
              placeholder="Ej. Ana Rodríguez"
              autocomplete="name"
            />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="username">Código de usuario</label>
            <input
              class="app-input auth-input"
              id="username"
              name="username"
              type="text"
              placeholder="Ej. 123456"
              autocomplete="username"
            />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="email">Correo electrónico</label>
            <input
              class="app-input auth-input"
              id="email"
              name="email"
              type="email"
              placeholder="nombre@institucion.edu"
              autocomplete="email"
            />
          </div>

          <div class="auth-field">
            <label class="auth-label" for="password">Contraseña</label>
            <input
              class="app-input auth-input"
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              autocomplete="new-password"
            />
          </div>

          <app-auth-submit-button label="Crear cuenta" />
        </form>

        <p class="auth-switch">
          ¿Ya tienes cuenta?
          <a routerLink="/login">Iniciar sesión</a>
        </p>
      </div>
    </div>

    <footer class="auth-footer">Acceso Institucional Seguro y Cifrado</footer>
  </div>
</section>
